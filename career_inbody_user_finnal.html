<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 커리어 인바디 진단</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html { -webkit-text-size-adjust:100%; text-size-adjust:100%; }
body { font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif; background:#eef2f7; color:#1a2a3a; min-height:100vh; font-size:17px; }
.screen { display:none; min-height:100vh; flex-direction:column; }
.screen.active { display:flex; }

/* INTRO */
#intro { align-items:center; justify-content:center; padding:30px 20px; }
.intro-card { background:#fff; border-radius:24px; padding:44px 32px; max-width:540px; width:100%; box-shadow:0 8px 40px rgba(0,40,100,.12); text-align:center; }
.logo-badge { display:inline-block; background:linear-gradient(135deg,#3a6fd8,#1a4ab8); color:#fff; font-size:13px; font-weight:800; letter-spacing:2px; padding:6px 18px; border-radius:30px; margin-bottom:18px; }
.intro-title { font-size:26px; font-weight:900; color:#0d1f3c; line-height:1.4; margin-bottom:6px; }
.intro-sub { font-size:17px; color:#3a6fd8; font-weight:700; margin-bottom:18px; }
.intro-desc { font-size:16px; color:#4a5a6a; line-height:1.9; margin-bottom:26px; }
.intro-meta { display:flex; gap:10px; margin-bottom:26px; }
.meta-item { flex:1; background:#f0f4fb; border-radius:14px; padding:18px 8px; }
.meta-num { font-size:26px; font-weight:900; color:#3a6fd8; }
.meta-label { font-size:14px; color:#6a7a8a; margin-top:4px; font-weight:600; }

.name-input { width:100%; border:2.5px solid #d0d8e8; border-radius:12px; padding:16px 18px; font-size:18px; font-weight:600; margin-bottom:14px; outline:none; transition:border .2s; color:#1a2a3a; }
.name-input:focus { border-color:#3a6fd8; }

.status-label { font-size:15px; font-weight:800; color:#1a2a3a; margin-bottom:10px; text-align:left; display:block; }
.status-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
.status-btn { display:flex; align-items:center; gap:10px; background:#f5f8fc; border:2.5px solid #d0d8e8; border-radius:14px; padding:14px 16px; cursor:pointer; transition:all .15s; }
.status-btn.selected { background:#eef3fc; border-color:#3a6fd8; }
.s-icon { font-size:22px; flex-shrink:0; }
.s-text { font-size:15px; font-weight:800; color:#1a2a3a; white-space:nowrap; }

.btn-primary { width:100%; background:linear-gradient(135deg,#3a6fd8,#1a4ab8); color:#fff; border:none; border-radius:14px; padding:18px; font-size:19px; font-weight:800; cursor:pointer; transition:opacity .2s; opacity:.45; pointer-events:none; }

/* SURVEY */
#survey { background:#eef2f7; }
.survey-header { background:#0d1f3c; padding:16px 20px; position:sticky; top:0; z-index:100; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.header-title { font-size:15px; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.header-step { font-size:15px; color:#7a9fd8; font-weight:700; }
.prog-track { height:8px; background:rgba(255,255,255,.2); border-radius:4px; }
.prog-fill { height:100%; background:#4a9fd8; border-radius:4px; transition:width .4s; }
.page-wrap { flex:1; padding:24px 18px 100px; max-width:680px; margin:0 auto; width:100%; }
.sec-title-bar { display:flex; align-items:center; gap:14px; background:#fff; border-radius:18px; padding:20px 22px; margin-bottom:20px; box-shadow:0 2px 12px rgba(0,40,100,.07); }
.sec-num-circle { width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg,#3a6fd8,#1a4ab8); color:#fff; font-size:20px; font-weight:900; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.sec-name { font-size:22px; font-weight:900; color:#0d1f3c; }
.sec-count { margin-left:auto; font-size:14px; font-weight:700; color:#3a6fd8; background:#eef3fc; padding:5px 12px; border-radius:20px; white-space:nowrap; }
.q-card { background:#fff; border-radius:18px; padding:22px 20px; margin-bottom:16px; box-shadow:0 2px 12px rgba(0,40,100,.06); border:2.5px solid transparent; transition:border .2s; }
.q-card.answered { border-color:#3a6fd8; }
.q-text { font-size:17px; font-weight:700; color:#1a2a3a; line-height:1.8; margin-bottom:18px; word-break:keep-all; }
.q-idx { color:#3a6fd8; font-weight:900; margin-right:4px; }
.likert { display:flex; gap:6px; }
.likert label { flex:1; cursor:pointer; }
.likert input { display:none; }
.l-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; height:80px; border-radius:12px; border:2.5px solid #dde4f0; background:#f8fafc; transition:all .15s; }
.l-score { font-size:20px; font-weight:900; color:#9aabb8; line-height:1; }
.l-label { font-size:10px; color:#8a9aaa; line-height:1.3; text-align:center; word-break:keep-all; font-weight:600; }
.likert input:checked + .l-btn { border-color:#3a6fd8; background:#eef3fc; }
.likert input:checked + .l-btn .l-score { color:#3a6fd8; }
.likert input:checked + .l-btn .l-label { color:#3a6fd8; }
.nav-bar { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #e0e8f0; padding:14px 20px; display:flex; gap:12px; z-index:200; }
.btn-nav { flex:1; border-radius:12px; padding:16px; font-size:17px; font-weight:800; cursor:pointer; border:none; white-space:nowrap; }
.btn-prev { background:#f0f4f8; color:#4a5a6a; }
.btn-next { background:linear-gradient(135deg,#3a6fd8,#1a4ab8); color:#fff; }
.btn-next:disabled { background:#c8d4e8; cursor:not-allowed; }

/* RESULT */
#result { background:#eef2f7; }
.result-hero { background:linear-gradient(150deg,#0d1f3c,#1a3a7c); padding:40px 24px 36px; text-align:center; color:#fff; }
.r-label { font-size:14px; color:#8aabda; letter-spacing:1px; margin-bottom:6px; font-weight:700; }
.r-title { font-size:22px; font-weight:900; margin-bottom:18px; }
.r-name { font-size:17px; color:#cde; margin-bottom:4px; font-weight:700; }
.r-total { font-size:42px; font-weight:900; color:#fff; margin:8px 0; }
.r-total span { font-size:20px; color:#9ab; font-weight:600; }
.r-grade-badge { display:inline-block; border-radius:30px; padding:8px 24px; font-size:16px; font-weight:800; margin-top:8px; }
.result-body { max-width:680px; margin:0 auto; padding:24px 18px 0; }
.sec-result-card { background:#fff; border-radius:18px; padding:22px 20px; margin-bottom:14px; box-shadow:0 2px 12px rgba(0,40,100,.07); }
.src-header { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.src-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.src-name { font-size:19px; font-weight:900; color:#0d1f3c; }
.src-score { margin-left:auto; font-size:20px; font-weight:900; }
.src-bar { height:12px; background:#eef2f7; border-radius:6px; overflow:hidden; margin-bottom:10px; }
.src-fill { height:100%; border-radius:6px; }
.src-five { font-size:14px; font-weight:700; display:inline-block; padding:4px 12px; border-radius:20px; }
.feedback-card { background:#fff; border-radius:18px; padding:24px 20px; margin-bottom:14px; box-shadow:0 2px 12px rgba(0,40,100,.07); }
.fb-title { font-size:18px; font-weight:900; color:#0d1f3c; margin-bottom:14px; }
.fb-text { font-size:16px; color:#2a3a4a; line-height:1.9; background:#f5f8fc; border-radius:12px; padding:18px; border-left:5px solid #3a6fd8; word-break:keep-all; font-weight:600; }
.sw-wrap { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
.sw-card { background:#fff; border-radius:18px; padding:20px; box-shadow:0 2px 12px rgba(0,40,100,.07); }
.sw-title { font-size:15px; font-weight:900; margin-bottom:12px; }
.sw-item { font-size:15px; font-weight:700; color:#2a3a4a; padding:8px 0; border-bottom:1px solid #f0f4f8; display:flex; align-items:center; gap:6px; }
.sw-item:last-child { border-bottom:none; }
.btn-retry { display:block; width:100%; background:#0d1f3c; color:#fff; border:none; border-radius:14px; padding:18px; font-size:18px; font-weight:800; cursor:pointer; margin-bottom:40px; }

@media(max-width:480px){
  .sw-wrap { grid-template-columns:1fr; }
  .intro-card { padding:36px 20px; }
  .intro-title { font-size:22px; }
  .btn-nav { font-size:15px; padding:14px 10px; }
  .sec-name { font-size:19px; }
  .q-text { font-size:16px; }
}
@media(max-width:360px){
  .s-text { font-size:14px; }
  .status-btn { padding:12px 10px; gap:8px; }
  .btn-primary { font-size:17px; }
  .l-btn { height:72px; }
  .l-score { font-size:18px; }
  .l-label { font-size:9px; }
}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro" class="screen active">
  <div class="intro-card">
    <div class="logo-badge">AI Career Inbody</div>
    <div class="intro-title">AI 커리어 인바디 진단하기</div>
    <div class="intro-sub">(재취업 준비도 검사)</div>
    <div class="intro-desc">현재 나의 재취업 준비도를 파악하는 검사입니다.<br>각 질문에 솔직하게 답변해 주시면 됩니다.</div>
    <div class="intro-meta">
      <div class="meta-item"><div class="meta-num">6</div><div class="meta-label">측정 항목</div></div>
      <div class="meta-item"><div class="meta-num">36</div><div class="meta-label">설문 문항</div></div>
      <div class="meta-item"><div class="meta-num">180</div><div class="meta-label">만점</div></div>
    </div>
    <input class="name-input" id="nameInput" type="text" placeholder="성함을 입력해 주세요" oninput="checkReady()"/>
    <span class="status-label">현재 상태를 선택해 주세요</span>
    <div class="status-grid">
      <label class="status-btn" onclick="selectStatus(this,'재직중')"><input type="radio" name="status" style="display:none"><span class="s-icon">💼</span><span class="s-text">재직중</span></label>
      <label class="status-btn" onclick="selectStatus(this,'퇴직예정')"><input type="radio" name="status" style="display:none"><span class="s-icon">📅</span><span class="s-text">퇴직예정</span></label>
      <label class="status-btn" onclick="selectStatus(this,'퇴직')"><input type="radio" name="status" style="display:none"><span class="s-icon">🚪</span><span class="s-text">퇴직</span></label>
      <label class="status-btn" onclick="selectStatus(this,'기타')"><input type="radio" name="status" style="display:none"><span class="s-icon">📝</span><span class="s-text">기타</span></label>
    </div>
    <button class="btn-primary" id="btnStart" onclick="startSurvey()">검사 시작하기 →</button>
  </div>
</div>

<!-- SURVEY -->
<div id="survey" class="screen">
  <div class="survey-header">
    <div class="header-top">
      <div class="header-title" id="hTitle"></div>
      <div class="header-step" id="hStep"></div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="page-wrap" id="pageWrap"></div>
  <div class="nav-bar">
    <button class="btn-nav btn-prev" id="btnPrev" onclick="goPage(-1)">← 이전</button>
    <button class="btn-nav btn-next" id="btnNext" onclick="goNext()">다음 →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="result-hero">
    <div class="r-label">AI Career Inbody</div>
    <div class="r-title">AI 커리어 인바디 검사 결과</div>
    <div class="r-name" id="rName"></div>
    <div class="r-total" id="rTotal"></div>
    <div class="r-grade-badge" id="rBadge"></div>
  </div>
  <div class="result-body">
    <div id="rCards"></div>
    <div class="feedback-card">
      <div class="fb-title">📋 종합 피드백</div>
      <div class="fb-text" id="rFeedback"></div>
    </div>
    <div class="sw-wrap" id="rSW"></div>
    <button class="btn-retry" onclick="retry()">🔄 다시 검사하기</button>
  </div>
</div>

<script>
const SEC_COLORS = ['#1a6ab8','#c0392b','#27ae60','#8e44ad','#d4820a','#16a085'];

  B:'재취업을 위한 기본 역량은 갖추고 있으나, 일부 영역에서 추가적인 준비가 필요합니다. 3개월 내 집중 개발 계획을 세워보시기를 권장합니다.',
  C:'재취업 준비의 초기 단계에 있습니다. 지금부터 체계적인 준비를 시작한다면 충분히 좋은 결과를 얻을 수 있습니다.',
  D:'지금은 재취업 준비의 출발점에 서 계십니다. 한 가지씩 차근차근 준비해 나가면 됩니다.'
};

let userName='', userStatus='', curPage=0;
let answers = Array.from({length:6},()=>Array(6).fill(0));

function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }

function selectStatus(el,val){
  userStatus=val;
  document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  checkReady();
}
function checkReady(){
  const v=document.getElementById('nameInput').value.trim();
  const ok=v.length>0&&userStatus!=='';
  const btn=document.getElementById('btnStart');
  btn.style.opacity=ok?'1':'0.45';
  btn.style.pointerEvents=ok?'auto':'none';
}
function startSurvey(){
  const n=document.getElementById('nameInput').value.trim();
  if(!n||!userStatus) return;
  userName=n; curPage=0;
  answers=Array.from({length:6},()=>Array(6).fill(0));
  show('survey'); renderPage();
}

function renderPage(){
  const sec=SECTIONS[curPage];
  document.getElementById('hTitle').textContent=`${sec.icon} ${sec.name} 항목`;
  document.getElementById('hStep').textContent=`${curPage+1} / 6`;
  document.getElementById('progFill').style.width=(curPage/6*100)+'%';
  const done=answers[curPage].filter(v=>v>0).length;
  document.getElementById('pageWrap').innerHTML=`
    <div class="sec-title-bar">
      <div class="sec-num-circle">${curPage+1}</div>
      <div class="sec-name">${sec.icon} ${sec.name} 항목</div>
      <div class="sec-count" id="secCount">${done}/6 완료</div>
    </div>
    ${sec.qs.map((q,qi)=>`
      <div class="q-card ${answers[curPage][qi]>0?'answered':''}" id="qcard_${qi}">
        <div class="q-text"><span class="q-idx">${qi+1})</span> ${q}</div>
        <div class="likert">
          ${[1,2,3,4,5].map(v=>`
            <label><input type="radio" name="q_${curPage}_${qi}" value="${v}" ${answers[curPage][qi]===v?'checked':''} onchange="onAns(${qi},${v})">
            <div class="l-btn"><div class="l-score">${v}</div><div class="l-label">${LABELS[v-1]}</div></div></label>
          `).join('')}
        </div>
      </div>`).join('')}`;
  updateNav(); window.scrollTo(0,0);
}
function onAns(qi,val){
  answers[curPage][qi]=val;
  document.getElementById(`qcard_${qi}`)?.classList.add('answered');
  const done=answers[curPage].filter(v=>v>0).length;
  const el=document.getElementById('secCount'); if(el) el.textContent=`${done}/6 완료`;
  updateNav();
}
function updateNav(){
  const done=answers[curPage].filter(v=>v>0).length;
  document.getElementById('btnPrev').style.display=curPage===0?'none':'block';
  const nb=document.getElementById('btnNext');
  nb.textContent=curPage===5?'결과 보기 →':'다음 →';
  nb.disabled=done<6;
}
function goPage(d){ curPage=Math.max(0,Math.min(5,curPage+d)); renderPage(); }
function goNext(){ curPage<5?goPage(1):showResult(); }

function getGrade(t){
  if(t>=162) return{grade:'S',label:'최상위 준비 완료',color:'#1a6ab8',bg:'rgba(26,106,184,.15)'};
  if(t>=144) return{grade:'A',label:'준비 우수',color:'#27ae60',bg:'rgba(39,174,96,.15)'};
  if(t>=108) return{grade:'B',label:'준비 양호',color:'#d4820a',bg:'rgba(212,130,10,.15)'};
  if(t>=72)  return{grade:'C',label:'준비 미흡',color:'#e07820',bg:'rgba(224,120,32,.15)'};
  return{grade:'D',label:'준비 시작 단계',color:'#c0392b',bg:'rgba(192,57,43,.15)'};
}

function showResult(){
  const scores=answers.map(a=>a.reduce((s,v)=>s+v,0));
  const total=scores.reduce((a,b)=>a+b,0);
  const g=getGrade(total);
  document.getElementById('rName').textContent=`${userName} 님 (${userStatus})`;
  document.getElementById('rTotal').innerHTML=`${total}점 <span>/ 180점</span>`;
  const badge=document.getElementById('rBadge');
  badge.textContent=g.label;
  badge.style.cssText=`background:${g.bg};color:${g.color};display:inline-block;border-radius:30px;padding:8px 24px;font-size:16px;font-weight:800;margin-top:8px;`;

  document.getElementById('rCards').innerHTML=SECTIONS.map((sec,i)=>{
    const pct=Math.round(scores[i]/30*100);
    const five=answers[i].filter(v=>v===5).length;
    return `<div class="sec-result-card">
      <div class="src-header">
        <div class="src-icon" style="background:${SEC_COLORS[i]}">${sec.icon}</div>
        <div class="src-name">${sec.name}</div>
        <div class="src-score" style="color:${SEC_COLORS[i]}">${scores[i]}/30</div>
      </div>
      <div class="src-bar"><div class="src-fill" style="width:${pct}%;background:${SEC_COLORS[i]}"></div></div>
      <div class="src-five" style="background:${SEC_LIGHT[i]};color:${SEC_COLORS[i]}">⭐ 5점 만점 ${five}문항</div>
    </div>`;
  }).join('');

  document.getElementById('rFeedback').textContent=FEEDBACK[g.grade];
  const sorted=SECTIONS.map((s,i)=>({name:s.name,icon:s.icon,score:scores[i]})).sort((a,b)=>b.score-a.score);
  document.getElementById('rSW').innerHTML=`
    <div class="sw-card">
      <div class="sw-title" style="color:#3a6fd8">💪 강점 영역 TOP 3</div>
      ${sorted.slice(0,3).map(s=>`<div class="sw-item">${s.icon} ${s.name}<strong style="margin-left:auto;color:#3a6fd8">${s.score}점</strong></div>`).join('')}
    </div>
    <div class="sw-card">
      <div class="sw-title" style="color:#c0392b">📌 보완 필요 영역</div>
      ${sorted.slice(3).reverse().map(s=>`<div class="sw-item">${s.icon} ${s.name}<strong style="margin-left:auto;color:#c0392b">${s.score}점</strong></div>`).join('')}
    </div>`;
  show('result');
}

function retry(){
  userStatus=''; userName='';
  document.getElementById('nameInput').value='';
  document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('selected'));
  checkReady();
  show('intro');
}
</script>
</body>
</html>
